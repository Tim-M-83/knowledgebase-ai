services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: knowledgebase
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d knowledgebase']
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: kb_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kb_api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./backend:/app
      - uploads_data:/data/uploads
      - app_logs_data:/data/logs
    ports:
      - '8000:8000'

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kb_worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.tasks.celery_app.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
      - uploads_data:/data/uploads
      - app_logs_data:/data/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kb_frontend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - '3000:3000'

volumes:
  postgres_data:
  uploads_data:
  app_logs_data:
